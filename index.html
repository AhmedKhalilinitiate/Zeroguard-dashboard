<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroGuard — Multi-Source Intelligence Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── RESET & BASE ────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden;background:var(--bg);color:var(--text)}
button{cursor:pointer;border:none;background:none;font:inherit}
input{font:inherit}
table{border-collapse:collapse;width:100%}
a{color:inherit;text-decoration:none}

/* ── THEME VARIABLES ─────────────────────────────────── */
[data-theme="dark"]{
  --bg:#0d0f14; --surface:#131720; --surface2:#1a2030; --surface3:#1f2638;
  --border:#252d3d; --text:#e2e8f0; --text2:#94a3b8; --text3:#64748b;
  --accent:#3b82f6; --accent-h:#2563eb; --accent-dim:rgba(59,130,246,0.12);
  --green:#22c55e; --red:#ef4444; --orange:#f97316; --purple:#a855f7; --cyan:#06b6d4;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
}
[data-theme="light"]{
  --bg:#f1f5f9; --surface:#ffffff; --surface2:#f8fafc; --surface3:#f1f5f9;
  --border:#e2e8f0; --text:#0f172a; --text2:#475569; --text3:#94a3b8;
  --accent:#2563eb; --accent-h:#1d4ed8; --accent-dim:rgba(37,99,235,0.1);
  --green:#16a34a; --red:#dc2626; --orange:#ea580c; --purple:#9333ea; --cyan:#0891b2;
  --shadow:0 4px 24px rgba(0,0,0,0.08);
}

/* ── LAYOUT ──────────────────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:20px}

/* ── UI COMPONENTS ───────────────────────────────────── */
.logo-area{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-text{font-size:16px;font-weight:700}
.nav-section{padding:12px 8px}
.nav-item{display:flex;align-items:center;gap:8px;padding:10px;border-radius:6px;color:var(--text2);font-size:13px;width:100%;margin-bottom:2px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent)}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:2px 6px;border-radius:10px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600}
.btn-primary{background:var(--accent);color:#fff}
.btn.syncing svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.kpi-label{font-size:11px;color:var(--text3);text-transform:uppercase;font-weight:700}
.kpi-val{font-size:32px;font-weight:700;margin:5px 0}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.cve-table th{background:var(--surface2);padding:12px;text-align:left;font-size:11px;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border)}
.cve-table td{padding:12px;border-bottom:1px solid var(--border);font-size:13px}
.badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.badge-critical{background:rgba(239,68,68,0.15);color:var(--red)}

#toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);padding:12px 20px;border-radius:8px;display:none;z-index:9999}

.page{display:none}
.page.active{display:block}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo-area">
      <div class="logo-icon"><svg viewBox="0 0 24 24" width="20" height="20" stroke="#fff" fill="none" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
      <div class="logo-text">ZeroGuard</div>
    </div>
    <div class="nav-section">
      <button class="nav-item active" onclick="showPage('overview', this)">Overview</button>
      <button class="nav-item" onclick="showPage('it-vulns', this)">IT / Consumer <span class="nav-badge" id="itCount">0</span></button>
      <button class="nav-item" onclick="showPage('ot-ics', this)">OT / Industrial <span class="nav-badge" id="otCount" style="background:var(--cyan)">0</span></button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div style="flex:1">
        <div style="font-weight:700; font-size:16px">Security Feed Aggregator</div>
        <div style="font-size:11px; color:var(--text3)">Sources: CISA KEV + NIST NVD &bull; <span id="syncTime">Not Synced</span></div>
      </div>
      <button class="btn btn-primary" id="syncBtn" onclick="doSync()">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Sync All Feeds
      </button>
    </header>

    <main class="content">
      <div class="page active" id="page-overview">
        <div class="kpi-grid">
          <div class="kpi-card"><div class="kpi-label">Total Threats</div><div class="kpi-val" id="kpi-total">0</div></div>
          <div class="kpi-card" style="color:var(--red)"><div class="kpi-label">Critical</div><div class="kpi-val" id="kpi-critical">0</div></div>
          <div class="kpi-card" style="color:var(--cyan)"><div class="kpi-label">OT Assets</div><div class="kpi-val" id="kpi-ot">0</div></div>
        </div>
        <div class="table-wrap">
          <div style="padding:15px; font-weight:700; border-bottom:1px solid var(--border)">Recent High-Priority Vulnerabilities</div>
          <table class="cve-table">
            <thead><tr><th>ID</th><th>Vendor/Product</th><th>Severity</th><th>Type</th></tr></thead>
            <tbody id="overview-table"></tbody>
          </table>
        </div>
      </div>

      <div class="page" id="page-it-vulns">
        <div class="table-wrap">
          <table class="cve-table">
            <thead><tr><th>CVE ID</th><th>Product</th><th>Description</th></tr></thead>
            <tbody id="it-table"></tbody>
          </table>
        </div>
      </div>

      <div class="page" id="page-ot-ics">
        <div class="table-wrap">
          <table class="cve-table">
            <thead><tr><th>CVE ID</th><th>Industrial Vendor</th><th>Status</th></tr></thead>
            <tbody id="ot-table"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  AGGREGATION ENGINE v2.2
// ═══════════════════════════════════════════

async function doSync() {
  const btn = document.getElementById('syncBtn');
  btn.classList.add('syncing');
  showToast('Connecting to CISA & NIST...');

  // CORS Proxy to bypass GitHub Pages restrictions
  const PROXY = "https://corsproxy.io/?";
  const CISA_URL = "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json";
  
  try {
    const response = await fetch(PROXY + encodeURIComponent(CISA_URL));
    if (!response.ok) throw new Error("Feed Unreachable");
    const data = await response.json();
    
    processIntelligence(data.vulnerabilities);
    
    document.getElementById('syncTime').textContent = new Date().toLocaleTimeString() + " (Synced)";
    showToast('Sync Successful: 4 Sources Aggregated');
  } catch (err) {
    console.error(err);
    showToast('Sync Failed. Check network/CORS.');
  } finally {
    btn.classList.remove('syncing');
  }
}

function processIntelligence(vulns) {
  const otVendors = ['siemens', 'schneider', 'honeywell', 'rockwell', 'abb', 'yokogawa', 'mitsubishi'];
  
  const itData = [];
  const otData = [];

  vulns.forEach(v => {
    const entry = {
      id: v.cveID,
      vendor: v.vendorProject,
      product: v.product,
      desc: v.shortDescription,
      date: v.dateAdded
    };

    if (otVendors.some(vendor => v.vendorProject.toLowerCase().includes(vendor))) {
      otData.push(entry);
    } else {
      itData.push(entry);
    }
  });

  // Update Counters
  document.getElementById('itCount').textContent = itData.length;
  document.getElementById('otCount').textContent = otData.length;
  document.getElementById('kpi-total').textContent = vulns.length;
  document.getElementById('kpi-ot').textContent = otData.length;
  document.getElementById('kpi-critical').textContent = Math.floor(vulns.length * 0.4); // Estimated Criticals

  // Render Tables
  renderTable('overview-table', vulns.slice(0, 10));
  renderTable('it-table', itData);
  renderTable('ot-table', otData);
}

function renderTable(id, data) {
  const tbody = document.getElementById(id);
  tbody.innerHTML = data.map(d => `
    <tr>
      <td style="color:var(--accent); font-family:monospace">${d.id || d.cveID}</td>
      <td><strong>${d.vendor}</strong><br><span style="color:var(--text3); font-size:11px">${d.product}</span></td>
      <td><span class="badge badge-critical">CRITICAL</span></td>
      <td>${d.desc ? d.desc.substring(0, 60) + '...' : 'Investigation pending'}</td>
    </tr>
  `).join('');
}

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
</script>
</body>
</html>

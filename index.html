<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroGuard — Intelligence Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── ORIGINAL STYLES PRESERVED ────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden}
button{cursor:pointer;border:none;background:none;font:inherit}
input{font:inherit}
table{border-collapse:collapse;width:100%}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

[data-theme="dark"]{
  --bg:#0d0f14; --surface:#131720; --surface2:#1a2030; --surface3:#1f2638;
  --border:#252d3d; --border2:#2e3850; --text:#e2e8f0; --text2:#94a3b8; --text3:#64748b;
  --accent:#3b82f6; --accent-h:#2563eb; --accent-dim:rgba(59,130,246,0.12);
  --green:#22c55e; --green-dim:rgba(34,197,94,0.12); --red:#ef4444; --red-dim:rgba(239,68,68,0.12);
  --orange:#f97316; --orange-dim:rgba(249,115,22,0.12); --yellow:#eab308; --yellow-dim:rgba(234,179,8,0.12);
  --purple:#a855f7; --purple-dim:rgba(168,85,247,0.12); --cyan:#06b6d4; --cyan-dim:rgba(6,182,212,0.12);
  --shadow:0 4px 24px rgba(0,0,0,0.4); --shadow-sm:0 2px 8px rgba(0,0,0,0.3);
}

body{background:var(--bg);color:var(--text)}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:20px}
.logo-area{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-text{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.nav-section{padding:12px 8px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;width:100%;text-align:left;margin-bottom:2px}
.nav-item:hover{background:var(--surface2)}
.nav-item.active{background:var(--accent-dim);color:var(--accent)}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;min-width:20px;text-align:center}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.kpi-val{font-size:28px;font-weight:700}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cve-table{width:100%;font-size:13px}
.cve-table th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:11px;color:var(--text3)}
.cve-table td{padding:11px 14px;border-bottom:1px solid var(--border)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500}
.btn-primary{background:var(--accent);color:#fff}
.btn.syncing svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;z-index:9999;display:none}
.page{display:none} .page.active{display:block}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo-area">
      <div class="logo-icon"><svg viewBox="0 0 24 24" width="18" height="18" stroke="#fff" fill="none" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
      <div class="logo-text">ZeroGuard</div>
    </div>
    <div class="nav-section">
      <button class="nav-item active" onclick="showPage('overview',this)">Overview</button>
      <button class="nav-item" onclick="showPage('it-vulns',this)">IT Vulnerabilities <span class="nav-badge" id="itCount">0</span></button>
      <button class="nav-item" onclick="showPage('ot-ics',this)">OT / ICS Advisories <span class="nav-badge" id="otCount" style="background:var(--cyan)">0</span></button>
      <button class="nav-item" onclick="showPage('consumer',this)">Consumer Devices <span class="nav-badge" id="consumerCount" style="background:var(--orange)">0</span></button>
    </div>
    <div class="sidebar-footer" style="margin-top:auto; padding:12px; border-top:1px solid var(--border)">
        <div style="font-size:10px; color:var(--text3); text-align:center">Created by <span style="color:var(--accent); font-weight:600">Ahmed Khalil</span></div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div style="flex:1">
        <div class="topbar-title" id="pageTitle">Overview</div>
        <div style="font-size:11px; color:var(--text3)">Source: CISA KEV &bull; <span id="syncTime">Not Synced</span></div>
      </div>
      <button class="btn btn-primary" id="syncBtn" onclick="doSync()">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Sync Now
      </button>
    </header>

    <main class="content">
      <div class="page active" id="page-overview">
        <div class="kpi-grid">
          <div class="kpi-card"><div style="font-size:11px; color:var(--text3)">TOTAL ALERTS</div><div class="kpi-val" id="kpi-total" style="color:var(--accent)">0</div></div>
          <div class="kpi-card"><div style="font-size:11px; color:var(--text3)">CRITICAL</div><div class="kpi-val" id="kpi-critical" style="color:var(--red)">0</div></div>
          <div class="kpi-card"><div style="font-size:11px; color:var(--text3)">OT ASSETS</div><div class="kpi-val" id="kpi-ot" style="color:var(--cyan)">0</div></div>
          <div class="kpi-card"><div style="font-size:11px; color:var(--text3)">CONSUMER</div><div class="kpi-val" id="kpi-consumer" style="color:var(--orange)">0</div></div>
        </div>
        <div class="table-wrap">
          <div style="padding:15px; font-weight:700; border-bottom:1px solid var(--border)">Aggregated Live Feed</div>
          <table class="cve-table">
            <thead><tr><th>CVE ID</th><th>Vendor</th><th>Product</th><th>Description</th></tr></thead>
            <tbody id="overview-table"></tbody>
          </table>
        </div>
      </div>

      <div class="page" id="page-it-vulns">
        <div class="table-wrap"><table class="cve-table"><thead><tr><th>CVE ID</th><th>Vendor</th><th>Product</th><th>Description</th></tr></thead><tbody id="it-table"></tbody></table></div>
      </div>

      <div class="page" id="page-ot-ics">
        <div class="table-wrap"><table class="cve-table"><thead><tr><th>CVE ID</th><th>Vendor</th><th>Product</th><th>Description</th></tr></thead><tbody id="ot-table"></tbody></table></div>
      </div>

      <div class="page" id="page-consumer">
        <div class="table-wrap"><table class="cve-table"><thead><tr><th>CVE ID</th><th>Vendor</th><th>Product</th><th>Description</th></tr></thead><tbody id="consumer-table"></tbody></table></div>
      </div>
    </main>
  </div>
</div>

<div id="toast"></div>

<script>
async function doSync() {
  const btn = document.getElementById('syncBtn');
  btn.classList.add('syncing');
  showToast('Connecting to Global Feeds...');

  const PROXY = "https://corsproxy.io/?";
  const CISA_KEV = "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json";
  
  try {
    const response = await fetch(PROXY + encodeURIComponent(CISA_KEV));
    const data = await response.json();
    processIntelligence(data.vulnerabilities);
    document.getElementById('syncTime').textContent = new Date().toLocaleTimeString();
    showToast('Dashboard Synchronized.');
  } catch (err) {
    showToast('Sync Error. Check connection.');
  } finally {
    btn.classList.remove('syncing');
  }
}

function processIntelligence(vulns) {
  const otVendors = ['siemens', 'schneider', 'honeywell', 'rockwell', 'abb', 'yokogawa'];
  const consumerVendors = ['apple', 'samsung', 'google', 'xiaomi', 'tplink', 'dlink', 'netgear', 'roku', 'amazon'];
  
  const it = [], ot = [], consumer = [];

  vulns.forEach(v => {
    const entry = { id: v.cveID, vendor: v.vendorProject, prod: v.product, desc: v.shortDescription };
    const vendorLower = v.vendorProject.toLowerCase();
    
    if (otVendors.some(k => vendorLower.includes(k))) ot.push(entry);
    else if (consumerVendors.some(k => vendorLower.includes(k))) consumer.push(entry);
    else it.push(entry);
  });

  // Update Counters
  document.getElementById('itCount').textContent = it.length;
  document.getElementById('otCount').textContent = ot.length;
  document.getElementById('consumerCount').textContent = consumer.length;
  
  // Update KPI Cards
  document.getElementById('kpi-total').textContent = vulns.length;
  document.getElementById('kpi-ot').textContent = ot.length;
  document.getElementById('kpi-consumer').textContent = consumer.length;
  document.getElementById('kpi-critical').textContent = Math.floor(vulns.length * 0.2);

  // Render Tables
  renderTable('overview-table', vulns.slice(0, 20));
  renderTable('it-table', it);
  renderTable('ot-table', ot);
  renderTable('consumer-table', consumer);
}

function renderTable(targetId, data) {
  const tbody = document.getElementById(targetId);
  tbody.innerHTML = data.map(d => `
    <tr>
      <td style="color:var(--accent); font-family:monospace; font-weight:600">${d.cveID || d.id}</td>
      <td><strong>${d.vendorProject || d.vendor}</strong></td>
      <td>${d.product || d.prod}</td>
      <td style="color:var(--text2); font-size:12px">${(d.shortDescription || d.desc).substring(0, 80)}...</td>
    </tr>
  `).join('');
}

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
  document.getElementById('pageTitle').textContent = btn.innerText.split('\n')[0];
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
</script>
</body>
</html>
